<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Box Project</title>

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-slate-900 min-h-screen flex items-center justify-center p-6">

    <div class="bg-slate-800 w-full max-w-6xl rounded-xl shadow-2xl p-6">

        <!-- Heading -->
        <h1 class="text-3xl font-bold text-white text-center mb-6">
            Grid Box Generator
        </h1>

        <!-- Buttons -->
        <div class="flex flex-wrap gap-4 justify-center mb-6">

            <button
                id="btn1"
                class="bg-yellow-500 hover:bg-yellow-400 text-black font-bold px-6 py-3 rounded-lg transition">
                ➕ Insert Box
            </button>

            <button
                id="btn2"
                class="bg-red-500 hover:bg-red-400 text-white font-bold px-6 py-3 rounded-lg transition">
                ❌ Remove Box
            </button>

            <button
                id="btn3"
                class="bg-blue-600 hover:bg-blue-500 text-white font-bold px-6 py-3 rounded-lg transition">
                🎨 Change Color
            </button>

        </div>

        <!-- Grid -->
        <div
            id="grid"
            class="bg-slate-700 rounded-lg p-4 grid grid-cols-6 gap-4 min-h-[500px]">

            <!-- Boxes will appear here -->

        </div>

    </div>

    <script src="main.js"></script>

</body>
</html>
